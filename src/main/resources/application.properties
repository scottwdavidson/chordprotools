spring.application.name=chordpro-parser
# Keep stdout clean for command output (tables, CSV, etc.) — no banner, no INFO chatter.
# Diagnostic logging can be re-enabled per-run with -Dlogging.level.com.pourchoices.chordpro=DEBUG
spring.main.banner-mode=off
logging.level.root=WARN
#logging.level.org.springframework=DEBUG
# logging.level.com.pourchoices.chordpro=DEBUG
# picocli.trace=DEBUG
chordprotools.catalog-index=./song-catalog.csv
chordprotools.gigs=./gigs.csv

# RC-500 deploy script generator
# Set these to your machine-specific paths, or override at runtime with
# --source / --target flags on the deploy-rc500 command.
chordprotools.backing-source-root=
chordprotools.rc500-target-root=
